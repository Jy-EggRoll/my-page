<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <link rel="icon" type="image/png" href="images/logo.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>蛋卷儿的个人主页</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <!-- 加载动画 -->
    <div class="loading-screen">
        <div class="loader"></div>
        <p>加载中</p>
    </div>

    <!-- 背景图片容器 -->
    <div class="background-container">
        <div class="background-overlay"></div>
        <img src="./images/紫色天空.png" id="background" alt="背景图片">
    </div>

    <!-- 主要内容容器 -->
    <main class="content">
        <div class="grid-container">
            <!-- 个人信息卡片 -->
            <div class="profile-card">
                <div class="avatar">
                    <img src="./images/logo.png" alt="蛋卷儿的头像">
                </div>
                <h1>蛋卷儿</h1>
                <p class="bio">欢迎来到我的个人主页</p>
                <div class="button-group">
                    <button onclick="changeWallpaper()">更换背景</button>
                    <a href="https://eggroll.pages.dev" class="button" target="_blank">我的博客</a>
                </div>
            </div>

            <!-- 时钟卡片 -->
            <div class="info-card clock-card">
                <h3>当前时间</h3>
                <div id="beijing-time" class="time-display">
                    <span class="label">北京时间</span>
                    <span class="time">--:--:--</span>
                </div>
                <div id="est-time" class="time-display">
                    <span class="label">美东时间</span>
                    <span class="time">--:--:--</span>
                </div>
            </div>

            <!-- 日历卡片 -->
            <div class="info-card calendar-card">
                <h3>日历</h3>
                <div id="calendar">
                    <div id="month-name"></div>
                    <div id="calendar-grid"></div>
                    <div class="date-display">
                        <span id="current-date">--</span>
                    </div>
                </div>
            </div>

            <!-- 关于我卡片 -->
            <div class="content-card">
                <h2>关于我</h2>
                <p>你好，我是蛋卷儿！目前就读于北京邮电大学计算机学院，数据科学与大数据技术专业。</p><br>
                <p>我热爱学习我感兴趣的新知识，最近我在学习计算机基础、前端开发等技术。</p><br>
                <p>我喜欢音乐、动漫，整体来看，我热爱技术和艺术。</p>
            </div>

            <!-- 我的爱好卡片 -->
            <div class="content-card">
                <h2>我的爱好</h2>
                <p>我的爱好广泛，包括但不限于以下几个：
                <ul class="hobby-list">
                    <li>研究系统</li>
                    <li>书法</li>
                    <li>民族音乐</li>
                    <li>钢琴曲</li>
                </ul>
            </div>

            <!-- 联系方式卡片 -->
            <div class="content-card">
                <h2>联系方式</h2>
                <p>可以通过邮件与我联系：<a href="mailto:JyEggRoll@outlook.com">JyEggRoll@outlook.com</a></p>
            </div>
        </div>
    </main>
    <footer>
        <div class="copyright">&copy; 2025 蛋卷儿 版权所有</div>
    </footer>

    <script src="js/main.js"></script>
</body>

</html>
